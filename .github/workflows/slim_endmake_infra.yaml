name: Slim Endmake infrastructure

on:
  workflow_dispatch:
    inputs:
      terraform_action:
        description: Terraform action to run.
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
      kubernetes_version:
        description: Target Kubernetes version. Use 1.32 first, then rerun with 1.33.
        required: true
        default: "1.32"
        type: choice
        options:
          - "1.32"
          - "1.33"
      cleanup_kubernetes_releases:
        description: Uninstall retired Kubernetes app and monitoring releases.
        required: true
        default: true
        type: boolean
      apply_active_kubernetes_releases:
        description: Apply the slim active Endmake and infra Helmfiles.
        required: true
        default: true
        type: boolean
      disable_clickhouse_deletion_protection:
        description: Disable ClickHouse deletion protection before Terraform apply.
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  slim_endmake_infra:
    runs-on: ubuntu-24.04
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      YC_SERVICE_ACCOUNT_KEY_FILE: /tmp/sa-key.json
      TF_VAR_storage_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
      TF_VAR_storage_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_db_password: ${{ secrets.DB_ADM_PASSWD }}
      TF_VAR_db_dev_password: ${{ secrets.DB_DEV_PASSWD }}
      TF_VAR_k8s_version: ${{ inputs.kubernetes_version }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      hm_env: gh

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Setup Terraform Mirror
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const os = require('os');
            const terraformFileConfig = os.platform() === 'win32'
              ? `${process.env.APPDATA}/terraform.rc`
              : `${process.env.HOME}/.terraformrc`;
            const mirror = `
              provider_installation {
                network_mirror {
                  url = "https://terraform-mirror.yandexcloud.net/"
                  include = ["registry.terraform.io/*/*"]
                }
                direct {
                  exclude = ["registry.terraform.io/*/*"]
                }
              }
            `;
            fs.appendFileSync(terraformFileConfig, mirror);

      - name: Setup Yandex Cloud service account key
        run: |
          printf '%s' "$YC_KEY" > "$YC_SERVICE_ACCOUNT_KEY_FILE"
        env:
          YC_KEY: ${{ secrets.YC_KEY }}

      - name: Setup kubeconfig
        if: ${{ inputs.cleanup_kubernetes_releases || inputs.apply_active_kubernetes_releases }}
        run: |
          mkdir -p "${HOME}/.kube"
          echo "${{ secrets.KUBE_CONFIG_CA }}" | base64 --decode > "${HOME}/.kube/ca.pem"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > "${HOME}/.kube/config"
          chmod 600 "${HOME}/.kube/config"
          kubectl config use-context default

      - name: Setup helmfile
        if: ${{ inputs.cleanup_kubernetes_releases || inputs.apply_active_kubernetes_releases }}
        uses: mamezou-tech/setup-helmfile@v2.1.0
        with:
          helm-s3-plugin-version: "v0.16.2"
          helmfile-version: "v0.170.1"
          helm-version: "v3.13.1"

      - name: Update Helm repositories
        if: ${{ inputs.cleanup_kubernetes_releases || inputs.apply_active_kubernetes_releases }}
        run: |
          helm repo add crashteamdev https://crashteamdev.github.io/charts/ --force-update
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx --force-update
          helm repo add certmanager https://charts.jetstack.io --force-update
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts --force-update
          helm repo add grafana https://grafana.github.io/helm-charts --force-update
          helm repo add hashicorp https://helm.releases.hashicorp.com --force-update
          helm repo add requarks https://charts.js.wiki --force-update
          helm repo add temporal https://go.temporal.io/helm-charts --force-update
          helm repo update

      - name: Prepare Helm state values
        if: ${{ inputs.cleanup_kubernetes_releases || inputs.apply_active_kubernetes_releases }}
        run: |
          values_set_list=$(cat << EOF
          --state-values-set services.redis.endpoint=${{ secrets.REDIS_HOST }}
          --state-values-set services.redis.password=${{ secrets.REDIS_PASSWORD }}
          --state-values-set services.postgres.endpoint=${{ secrets.PG_HOST }}
          --state-values-set services.postgres.uniUser=${{ secrets.PG_USER }}
          --state-values-set services.postgres.uniPassword=${{ secrets.PG_PASSWORD }}
          --state-values-set services.mongodb.host=${{ secrets.MONGO_HOST }}
          --state-values-set services.mongodb.uniUser=${{ secrets.MONGO_USER }}
          --state-values-set services.mongodb.uniPassword=${{ secrets.MONGO_PASSWORD }}
          --state-values-set services.proxy.proxyLineApiKey=${{ secrets.PROXY_LINE_API_KEY }}
          --state-values-set services.clickhouse.host=${{ secrets.CLICKHOUSE_HOST }}
          --state-values-set services.clickhouse.password=${{ secrets.CLICKHOUSE_PASSWORD }}
          --state-values-set services.firebase.apikey=${{ secrets.FIREBASE_API_KEY }}
          --state-values-set services.strapi.appKeys=${{ secrets.STRAPI_APP_KEYS }}
          --state-values-set services.strapi.jwtAdminSecret=${{ secrets.STRAPI_ADMIN_JWT_SECRET }}
          --state-values-set services.strapi.jwtSecret=${{ secrets.STRAPI_JWT_SECRET }}
          --state-values-set services.strapi.apiTokenSalt=${{ secrets.STRAPI_API_TOKEN_SALT }}
          --state-values-set prometheus.grafana.password=${{ secrets.GRAFANA_PASSWORD }}
          --state-values-set services.grafana.openid.client_id=${{ secrets.GRAFANA_CLIENT_ID }}
          --state-values-set services.grafana.openid.client_secret=${{ secrets.GRAFANA_CLIENT_SECRET }}
          EOF
          )
          echo "values_set_list<<EOF" >> "$GITHUB_ENV"
          echo "$values_set_list" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Uninstall retired application releases
        if: ${{ inputs.cleanup_kubernetes_releases }}
        run: |
          cd helmfile
          helmfile -e "$hm_env" -f helmfile-retired.yaml \
            $values_set_list \
            sync --skip-deps

      - name: Uninstall retired infra releases
        if: ${{ inputs.cleanup_kubernetes_releases }}
        run: |
          cd helmfile
          helmfile -e "$hm_env" -f helmfile-retired-infra.yaml \
            sync --skip-deps

      - name: Apply active Endmake releases
        if: ${{ inputs.apply_active_kubernetes_releases }}
        run: |
          cd helmfile
          helmfile -e "$hm_env" -f helmfile.yaml \
            $values_set_list \
            sync --args="--atomic" --wait --skip-deps

      - name: Apply active infra releases
        if: ${{ inputs.apply_active_kubernetes_releases }}
        run: |
          cd helmfile
          helmfile -e "$hm_env" -f helmfile-infra.yaml \
            sync --args="--atomic" --wait --skip-deps

      - name: Install Yandex Cloud CLI
        if: ${{ inputs.disable_clickhouse_deletion_protection }}
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i "$RUNNER_TEMP/yc" -n
          echo "$RUNNER_TEMP/yc/bin" >> "$GITHUB_PATH"

      - name: Disable ClickHouse deletion protection
        if: ${{ inputs.disable_clickhouse_deletion_protection }}
        run: |
          yc managed-clickhouse cluster update marketdb-clickhouse --deletion-protection=false

      - name: Terraform init
        run: |
          cd yandex
          terraform init \
            -backend-config="access_key=$AWS_ACCESS_KEY_ID" \
            -backend-config="secret_key=$AWS_SECRET_ACCESS_KEY"

      - name: Terraform validate
        run: |
          cd yandex
          terraform validate -no-color

      - name: Terraform plan
        run: |
          cd yandex
          terraform plan -no-color -out=tfplan

      - name: Terraform apply
        if: ${{ inputs.terraform_action == 'apply' }}
        run: |
          cd yandex
          terraform apply -no-color -auto-approve tfplan
