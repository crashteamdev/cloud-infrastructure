netpolicy:
  enabled: true
prometheus:
  enabled: true
  grafana:
    password: MyStrongPassword
ingresscontroller:
  enabled: true
certmanager:
  enabled: true

services:
  global:
    registry:
      repository: docker.io/crashteamdev
      imagePullSecret: { }

  postgres:
    external: true
    endpoint: { }
    uniUser: { }
    uniPassword: { }

  redis:
    endpoint: { }
    user: { }
    password: { }

  ingress:
    class: "nginx"
    rootDomain: marketdb.ru
    namespacedDomain: false
    tls:
      enabled: true
      letsEncrypt:
        enabled: true
        issuer: "letsencrypt-prod"
        internalIssuer: "letsencrypt-production-dns-cf"
      secretName: tlssecret-marketdb

  grafana:
    openid:
      client_id: some-id
      client_secret: somepasswordhere
